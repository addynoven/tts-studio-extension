            - text: by using the
            - link "Rayleigh quotient" [ref=e92] [cursor=pointer]:
              - /url: /wiki/Rayleigh_quotient
            - text: to obtain increasingly accurate
            - link "eigenvalue" [ref=e93] [cursor=pointer]:
              - /url: /wiki/Eigenvalue
            - text: estimates.
          - paragraph [ref=e94]:
            - text: Rayleigh quotient iteration is an
            - link "iterative method" [ref=e95] [cursor=pointer]:
              - /url: /wiki/Iterative_method
            - text: ", that is, it delivers a sequence of approximate solutions that"
            - link "converges" [ref=e96] [cursor=pointer]:
              - /url: /wiki/Limit_of_a_sequence
            - text: to a true solution in the limit. Very rapid convergence is guaranteed and no more than a few iterations are needed in practice to obtain a reasonable approximation. The Rayleigh quotient iteration algorithm
            - link "converges cubically" [ref=e97] [cursor=pointer]:
              - /url: /wiki/Rate_of_convergence
            - text: for Hermitian or symmetric matrices, given an initial vector that is sufficiently close to an
            - link "eigenvector" [ref=e98] [cursor=pointer]:
              - /url: /wiki/EigenVector
            - text: of the
            - link "matrix" [ref=e99] [cursor=pointer]:
              - /url: /wiki/Matrix_(mathematics)
            - text: that is being analyzed.
